<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0E0E0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Whisper — Podeli svoju priču</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/profile.css">
  <style>
    .toast {
      position: fixed;
      bottom: calc(var(--bottom-nav-h) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2A2A2D;
      color: #FFFFFF;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 999;
      opacity: 0;
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.08);
      max-width: calc(var(--max-w) - 32px);
      text-align: center;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <a class="header-logo" href="index.html">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.09-1.35A9.96 9.96 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.7 0-3.29-.43-4.67-1.19l-.33-.19-3.02.8.82-2.95-.21-.34A8 8 0 0 1 4 12c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 8-8 8z"/></svg>
      </div>
      <span class="logo-name">Whis<span>per</span></span>
    </a>

    <!-- Pre-login -->
    <div class="header-auth" id="header-auth">
      <button class="btn-ghost" id="btn-login">Prijavi se</button>
      <button class="btn-primary-sm" id="btn-signup">Registruj se</button>
    </div>

    <!-- Post-login -->
    <div class="header-user hidden" id="header-user">
      <div style="position:relative;">
        <button class="notif-btn" id="notif-btn" aria-label="Obaveštenja">
          <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>

        <!-- Notification Dropdown -->
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-dropdown-header">
            <h4>Obaveštenja</h4>
            <button class="notif-mark-all">Označi sve</button>
          </div>
          <div id="notif-list"></div>
        </div>
      </div>

      <button class="user-avatar-btn" id="btn-logout" title="Odjavi se">
        <div class="avatar sm" id="header-avatar" style="background:#FF3B5C">A</div>
        <span class="user-name-sm" id="header-username">Ti</span>
      </button>
    </div>
  </header>

  <!-- ===== FEED ===== -->
  <main class="feed-container">

    <!-- Topics -->
    <section class="topics-section">
      <div class="topics-label">Teme</div>
      <div class="topics-scroll" id="topics-scroll">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Daily Highlight -->
    <div class="daily-highlight" id="daily-highlight">
      <!-- Rendered by JS -->
    </div>

    <!-- Posts -->
    <div class="feed-section-header">
      <h2 class="feed-section-title">Priče</h2>
      <span class="feed-section-count" id="feed-count">0</span>
    </div>

    <div class="posts-list" id="posts-list">
      <!-- Rendered by JS -->
    </div>

  </main>

  <!-- ===== FAB ===== -->
  <button class="fab" id="fab" aria-label="Podeli priču">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Početna</span>
    </button>
    <button class="nav-item" onclick="openSearch()">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Istraži</span>
    </button>
    <button class="nav-item" onclick="openProfile()">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profil</span>
    </button>
  </nav>

  <!-- ===== COMPOSE MODAL ===== -->
  <div class="modal-backdrop" id="compose-backdrop"></div>

  <div class="modal-sheet" id="compose-modal">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Podeli svoju priču</h3>
    <p class="modal-subtitle">Sve je anonimno. Budi iskren.</p>

    <!-- Category -->
    <div class="category-select">
      <button class="cat-select-btn selected" data-cat="Ljubav">❤️ Ljubav</button>
      <button class="cat-select-btn" data-cat="Blamovi">😳 Blamovi</button>
      <button class="cat-select-btn" data-cat="Misli">💭 Misli</button>
      <button class="cat-select-btn" data-cat="Random">🎲 Random</button>
      <button class="cat-select-btn" data-cat="Posao">💼 Posao</button>
      <button class="cat-select-btn" data-cat="Veze">💔 Veze</button>
    </div>

    <!-- Text -->
    <textarea
      class="compose-textarea"
      id="compose-textarea"
      placeholder="Šta ti leži na srcu? Napiši slobodno, niko ne zna ko si..."
      maxlength="500"
    ></textarea>
    <div class="char-count" id="char-count">0 / 500</div>

    <div class="compose-bottom-row">
      <button class="btn-img-upload" id="compose-img-btn" onclick="openImagePicker()" type="button" title="Dodaj sliku">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        Slika
      </button>
      <div id="compose-img-preview"></div>
    </div>
    <input type="file" id="compose-img-input" accept="image/*" style="display:none" onchange="onComposeImageSelected(this)">

    <button class="btn-submit" id="compose-submit">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      Podeli anonimno
    </button>
  </div>

  <!-- ===== AUTH MODAL ===== -->
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <div class="auth-modal" id="auth-modal">
    <div class="modal-handle"></div>
    <div class="logo-icon" style="margin-bottom:16px; width:44px;height:44px;border-radius:14px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.09-1.35A9.96 9.96 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </div>
    <h3 class="modal-title">Dobrodošao/la u Whisper</h3>
    <p class="modal-subtitle" style="margin-top:-12px;">Anonimne priče, pravi osećaji.</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Prijava</button>
      <button class="auth-tab" data-tab="signup">Registracija</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form-panel auth-form" data-panel="login">
      <form id="login-form" class="auth-form">
        <div class="form-field">
          <label class="form-label">Email</label>
          <input class="form-input" id="login-email" type="email" placeholder="tvoj@email.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-label">Lozinka</label>
          <input class="form-input" id="login-password" type="password" placeholder="••••••" autocomplete="current-password">
        </div>
        <div class="hidden" id="login-error" style="color:var(--primary);font-size:13px;font-weight:600;"></div>
        <button type="submit" class="btn-submit">Prijavi se</button>
      </form>
      <div class="form-divider">ili</div>
      <button class="btn-guest" id="btn-guest">Nastavi bez naloga 👁️</button>
    </div>

    <!-- Signup Form -->
    <div class="auth-form-panel auth-form hidden" data-panel="signup">
      <form id="signup-form" class="auth-form">
        <div class="form-field">
          <label class="form-label">Korisničko ime</label>
          <input class="form-input" id="signup-username" type="text" placeholder="tvoje_ime" autocomplete="username">
        </div>
        <div class="form-field">
          <label class="form-label">Email</label>
          <input class="form-input" id="signup-email" type="email" placeholder="tvoj@email.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-label">Lozinka</label>
          <input class="form-input" id="signup-password" type="password" placeholder="min. 6 karaktera" autocomplete="new-password">
        </div>
        <div class="hidden" id="signup-error" style="color:var(--primary);font-size:13px;font-weight:600;"></div>
        <button type="submit" class="btn-submit">Registruj se 🎉</button>
      </form>
      <div class="form-divider">ili</div>
      <button class="btn-guest">Nastavi bez naloga 👁️</button>
    </div>
  </div>

  <!-- ===== PROFILE OVERLAY ===== -->
  <div class="profile-overlay" id="profile-overlay">

    <div class="profile-header">
      <h2 class="profile-title">Profil</h2>
      <button class="profile-close-btn" id="profile-close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="profile-body" id="profile-body">
      <!-- Rendered by JS -->
    </div>

  </div>

  <!-- ===== SEARCH OVERLAY ===== -->
  <div class="search-overlay" id="search-overlay">

    <div class="search-header">
      <h2 class="search-title">Istraži priče</h2>
      <button class="search-close-btn" id="search-close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="search-input-wrap">
      <div class="search-field" id="search-field" onclick="document.getElementById('search-input').focus()">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <div class="search-tags-row">
          <div class="search-tags" id="search-tags"></div>
          <input type="text" class="search-input" id="search-input" placeholder="Dodaj tag i pritisni Enter...">
        </div>
      </div>
    </div>

    <div class="search-quick-cats">
      <span class="search-quick-label">Brzo:</span>
      <button class="search-quick-btn" onclick="addTag('ljubav')">❤️ Ljubav</button>
      <button class="search-quick-btn" onclick="addTag('blamovi')">😳 Blamovi</button>
      <button class="search-quick-btn" onclick="addTag('misli')">💭 Misli</button>
      <button class="search-quick-btn" onclick="addTag('random')">🎲 Random</button>
      <button class="search-quick-btn" onclick="addTag('posao')">💼 Posao</button>
      <button class="search-quick-btn" onclick="addTag('veze')">💔 Veze</button>
    </div>

    <div class="search-results-header">
      <span class="search-count" id="search-count"></span>
    </div>

    <div class="search-results" id="search-results">
      <div class="search-empty-state">
        <span class="search-empty-emoji">🔍</span>
        <p>Dodaj tag da pretražiš priče</p>
      </div>
    </div>

  </div>

</div><!-- /#app -->

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/feed.js"></script>
<script src="js/search.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
